<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="none">
  <defs>
    <filter id="blur-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
    <radialGradient id="pink-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8eb1" stop-opacity="0.48" />
      <stop offset="70%" stop-color="#ff8eb1" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#ff8eb1" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="cream-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3d8" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#fff3d8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="violet-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8f7ccf" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#8f7ccf" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="900" fill="none" />

  <g filter="url(#blur-soft)">
    <circle cx="145" cy="150" r="150" fill="url(#pink-glow)" />
    <circle cx="340" cy="110" r="72" fill="#fff3d8" fill-opacity="0.14" />
    <circle cx="1030" cy="145" r="168" fill="url(#violet-glow)" />
    <circle cx="930" cy="300" r="86" fill="#ff8eb1" fill-opacity="0.18" />
    <circle cx="1090" cy="630" r="205" fill="url(#pink-glow)" />
    <circle cx="920" cy="760" r="92" fill="#fff3d8" fill-opacity="0.12" />
    <circle cx="290" cy="780" r="190" fill="url(#cream-glow)" />
    <circle cx="515" cy="735" r="102" fill="#8f7ccf" fill-opacity="0.16" />
    <circle cx="635" cy="215" r="54" fill="#fff3d8" fill-opacity="0.14" />
  </g>

  <g fill="none" stroke="#fff3d8" stroke-opacity="0.14">
    <circle cx="185" cy="205" r="118" stroke-width="3" />
    <circle cx="1035" cy="625" r="162" stroke-width="4" />
    <circle cx="325" cy="760" r="148" stroke-width="3" />
  </g>
</svg>
